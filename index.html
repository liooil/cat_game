<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素猫猫盘文玩 - 星露谷物语风</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 左侧 UI 面板 -->
        <div id="ui-panel">
            <h1>🐱 像素猫猫盘文玩</h1>
            
            <!-- 玩家状态区 (新增: 资金, 精力, 时间) -->
            <div class="panel-section player-stats">
                <div class="flex-between">
                    <p style="margin:0; font-weight:bold;">💰 资金: <span id="gold" class="gold-text">150</span></p>
                    <p style="margin:0; font-size:0.8rem; color:#bdc3c7;">时间: <span id="world-time">白天</span></p>
                </div>
                <div style="margin-top: 8px;">
                    <div class="flex-between" style="margin-bottom: 3px;">
                        <span style="font-size:0.85rem; color:#f39c12;">⚡ 精力: <span id="energy-val">100</span>/100</span>
                    </div>
                    <div class="energy-bar-bg">
                        <div id="energy-bar-fill" class="energy-bar-fill" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="flex-btn-group" style="margin-top: 8px;">
                    <button id="btn-work" class="btn-orange">去工作 (+500金,-50⚡)</button>
                    <button id="btn-sleep" class="btn-purple">睡觉 (满⚡)</button>
                </div>
            </div>

            <!-- 当前猫咪状态与快捷互动 -->
            <div class="panel-section cat-stats">
                <p class="section-title">🐱 当前选中猫咪</p>
                <div class="cat-info-row">品种: <span id="cat-breed">无</span></div>
                <div class="cat-info-row">心情: <span id="cat-mood">0</span>%</div>
                <div class="cat-info-row">佩戴: <span id="cat-item">无</span></div>
                
                <!-- 固定高度防止跳动 -->
                <div class="item-details-container">
                    <div id="cat-item-details" style="visibility:hidden;" class="item-details">
                        包浆: <span id="cat-item-polish">0.00</span>%<br>
                        估值: <span id="cat-item-value">0</span> 金币
                    </div>
                </div>
                
                <div class="flex-btn-group">
                    <button id="btn-feed">喂罐头 (5)</button>
                    <button id="btn-feed-salmon" class="btn-salmon" style="display:none;">喂三文鱼</button>
                    <button id="btn-play">逗猫玩</button>
                </div>
                <div class="flex-btn-group" style="margin-top: 5px;">
                    <button id="btn-give-cat" class="btn-purple">戴上手串</button>
                    <button id="btn-take-cat" class="btn-red">取下手串</button>
                </div>
            </div>

            <!-- 玩家背包与盘玩 -->
            <div class="panel-section flex-between">
                <div style="flex: 1;">
                    <p class="section-title">🎒 我的背包</p>
                    <select id="inventory-select" class="inventory-dropdown">
                        <option value="-1">空</option>
                    </select>
                    <button id="btn-sell" class="btn-green" style="width: 100%; margin-top: 5px;">出售此串</button>
                </div>
                <button id="btn-manual-polish" class="btn-hand">🙌</button>
            </div>

            <!-- 商店快捷入口 -->
            <div class="grid-actions">
                <button id="btn-buy-zijin">紫金鼠 (10)</button>
                <button id="btn-buy-kuka">库克 (30)</button>
                <button id="btn-buy-bodhi">菩提根 (50)</button>
                <button id="btn-buy-monkey">猴头 (100)</button>
                <button id="btn-buy-xingyue">星月 (150)</button>
                <button id="btn-adopt" class="btn-orange">领养猫 (100)</button>
            </div>

            <!-- 功能控制区 -->
            <div class="panel-section flex-btn-group" style="margin-top: 10px; margin-bottom: 10px;">
                <button id="btn-shop" class="btn-shop">🏪 家具与主题商店</button>
            </div>

            <!-- 场景切换区 (仅花园洋房显示) -->
            <div id="scene-nav" class="panel-section" style="display:none;">
                <p class="section-title" style="margin-bottom:5px;">🏡 切换区域</p>
                <div class="flex-btn-group">
                    <button id="btn-scene-f1">一楼</button>
                    <button id="btn-scene-f2">二楼</button>
                    <button id="btn-scene-garden">花园</button>
                </div>
            </div>

            <!-- 日志区 -->
            <div class="panel-section log-container">
                <ul id="game-log">
                    <li>欢迎来到星露谷猫猫文玩店！</li>
                </ul>
            </div>
        </div>

        <!-- 右侧 Canvas 渲染区 (4:3) -->
        <div id="canvas-container">
            <!-- 增加一层用来叠加随时间变化的光照遮罩 -->
            <div id="day-night-overlay"></div>
            <!-- 严格 640x480 分辨率 -->
            <canvas id="gameCanvas" width="640" height="480"></canvas>
        </div>
    </div>

    <!-- 商店模态框 -->
    <div id="shop-panel" class="shop-overlay" style="display: none;">
        <div class="shop-content panel">
            <div class="shop-header">
                <h3>猫咪家具主题店</h3>
                <button id="btn-close-shop" class="btn-red">关闭</button>
            </div>
            <div class="shop-sections">
                <div class="shop-section">
                    <h4>🪑 家具 (改变猫咪行为)</h4>
                    <button id="btn-buy-cat-bed">双色猫窝 (100金币) [+0.02/s]</button>
                    <button id="btn-buy-scratch-board">大号猫抓板 (150金币) [+0.05/s]</button>
                    <button id="btn-buy-cat-tree">豪华猫爬架 (200金币) [+0.1/s]</button>
                </div>
                <div class="shop-section">
                    <h4>🐟 特殊道具</h4>
                    <button id="btn-buy-salmon">三文鱼 (20金币) [回心情,包浆翻倍]</button>
                </div>
                <div class="shop-section">
                    <h4>🏠 房间主题</h4>
                    <button id="btn-buy-room-cozy">温馨小屋 (北欧风厨房) (500金币)</button>
                    <button id="btn-buy-room-garden">花园洋房 (三场景) (1000金币)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Modular Scripts in sequence -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/cat.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
